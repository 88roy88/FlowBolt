{{- if not .Values.secrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-builder.fullname" . }}-secrets
  labels:
    {{- include "ai-builder.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  AWS_DEFAULT_REGION: {{ .Values.secrets.awsRegion | quote }}
  AIB_DATABASE_URL: {{ include "ai-builder.databaseUrl" . | quote }}
  AIB_LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | quote }}
  AIB_LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | quote }}
  AIB_LANGFUSE_HOST: {{ .Values.secrets.langfuseHost | quote }}
  AIB_S3_ENDPOINT_URL: {{ .Values.secrets.s3EndpointUrl | quote }}
  AIB_S3_ACCESS_KEY: {{ .Values.secrets.s3AccessKey | quote }}
  AIB_S3_SECRET_KEY: {{ .Values.secrets.s3SecretKey | quote }}
  AIB_S3_BUCKET_NAME: {{ .Values.secrets.s3BucketName | quote }}
{{- end }}
