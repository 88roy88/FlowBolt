name: Backend CI

on:
  workflow_call:

jobs:
  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/uv-setup
      - run: uv run task ruff-dry-all
        working-directory: backend

  mypy:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    env:
      MYPY_CACHE_DIR: ${{ github.workspace }}/backend/.mypy_cache
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/uv-setup
      - uses: actions/cache@v4
        with:
          path: backend/.mypy_cache
          key: mypy-${{ hashFiles('backend/uv.lock', 'backend/mypy.toml') }}
          restore-keys: mypy-
      - run: uv run task mypy-all
        working-directory: backend

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/uv-setup
      - run: uv run task tests
        working-directory: backend
