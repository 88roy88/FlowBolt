<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock SSO Login</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 400px;
        width: 100%;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        color: #1a202c;
        margin-bottom: 8px;
        text-align: center;
      }
      .subtitle {
        color: #718096;
        font-size: 14px;
        text-align: center;
        margin-bottom: 32px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #4a5568;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.2s;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #5568d3;
      }
      button:active {
        background: #4c51bf;
      }
      .info {
        margin-top: 24px;
        padding: 12px;
        background: #edf2f7;
        border-radius: 6px;
        font-size: 12px;
        color: #4a5568;
        line-height: 1.5;
      }
      .info strong {
        color: #2d3748;
      }
      .error {
        margin-top: 16px;
        padding: 10px 12px;
        background: #fed7d7;
        color: #9b2c2c;
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.4;
      }
      .error[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Mock SSO Login</h1>
      <p class="subtitle">Development authentication</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="uniqueId">Unique ID</label>
          <input type="text" id="uniqueId" placeholder="dev-user" value="dev-user" />
        </div>

        <div class="form-group">
          <label for="givenName">Given Name (optional)</label>
          <input type="text" id="givenName" placeholder="Dev" value="Dev" />
        </div>

        <div class="form-group">
          <label for="surname">Surname (optional)</label>
          <input type="text" id="surname" placeholder="User" value="User" />
        </div>

        <div class="form-group">
          <label for="expiresInSeconds">Expires in (seconds, negative = already expired)</label>
          <input type="number" id="expiresInSeconds" placeholder="3600" value="3600" />
        </div>

        <div class="form-group">
          <label for="issuer">Issuer (JWT `iss` claim)</label>
          <input type="text" id="issuer" placeholder="https://issuer.example" value="https://issuer.example" />
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div id="errorMessage" class="error" role="alert" hidden></div>

      <div class="info">
        <strong>Dev Mode:</strong> This is a mock authentication page for local development. In
        production, this would be replaced by your actual SSO/SAML provider.
      </div>
    </div>

    <script>
      const errorEl = document.getElementById('errorMessage');
      const showError = (msg) => {
        errorEl.textContent = msg;
        errorEl.hidden = false;
      };
      const clearError = () => {
        errorEl.textContent = '';
        errorEl.hidden = true;
      };

      // Parse URL parameters for pre-filled values
      const params = new URLSearchParams(window.location.search);
      if (params.has('uniqueId')) {
        document.getElementById('uniqueId').value = params.get('uniqueId');
      }
      if (params.has('givenName')) {
        document.getElementById('givenName').value = params.get('givenName');
      }
      if (params.has('surname')) {
        document.getElementById('surname').value = params.get('surname');
      }
      if (params.has('expiresInSeconds')) {
        document.getElementById('expiresInSeconds').value = params.get('expiresInSeconds');
      }
      if (params.has('issuer')) {
        document.getElementById('issuer').value = params.get('issuer');
      }

      // Listen for credential requests from parent
      let pendingRequest = null;
      window.addEventListener('message', (event) => {
        const msg = event.data;
        if (
          msg &&
          typeof msg === 'object' &&
          (msg.type === 'requestCredentials' || msg.Type === 'RequestCredentials')
        ) {
          pendingRequest = { source: event.source, origin: event.origin };
        }
      });

      // UTF-8 safe base64url (handles Hebrew names in claims). Native APIs only.
      const base64url = (obj) => {
        const bytes = new TextEncoder().encode(JSON.stringify(obj));
        let binary = '';
        for (const b of bytes) binary += String.fromCharCode(b);
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      };

      // Build a JWT-shaped token (header.payload.signature) with alg: 'none'.
      // Backend uses verify_signature: false, so the dummy signature is accepted.
      const encodeUnsignedJwt = (claims) => {
        const header = base64url({ alg: 'none', typ: 'JWT' });
        const payload = base64url(claims);
        return header + '.' + payload + '.';
      };

      // Handle form submission
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        clearError();

        const uniqueId = document.getElementById('uniqueId').value.trim();
        const givenName = document.getElementById('givenName').value.trim();
        const surname = document.getElementById('surname').value.trim();
        const expiresInSeconds = Number(document.getElementById('expiresInSeconds').value);
        const issuer = document.getElementById('issuer').value.trim();

        if (!uniqueId) {
          showError('Unique ID is required');
          return;
        }

        // Mirror the real provider: claims are URL-keyed and live both in the
        // JWT payload (read by backend) and the envelope (read by frontend).
        const claimPrefix = 'https://issuer.example/v1/claims/';
        const claims = {
          exp:
            Math.floor(Date.now() / 1000) +
            (Number.isFinite(expiresInSeconds) ? expiresInSeconds : 3600),
          iss: issuer || 'flapi-mock',
          [claimPrefix + 'UniqueID']: uniqueId,
        };
        if (givenName) claims[claimPrefix + 'givenname'] = givenName;
        if (surname) claims[claimPrefix + 'surname'] = surname;

        const credentials = {
          type: 'deliverCredentials',
          auth_token: encodeUnsignedJwt(claims),
          ...claims,
        };

        const target = window.opener || (window.parent !== window ? window.parent : null);
        if (!target) {
          showError('No parent window found. Open this page from the SSO popup or iframe.');
          return;
        }
        const targetOrigin = pendingRequest?.origin || '*';
        target.postMessage(credentials, targetOrigin);
        setTimeout(() => window.close(), 100);
      });

      // Auto-submit if ?autoLogin=true
      if (params.has('autoLogin') && params.get('autoLogin') === 'true') {
        setTimeout(() => {
          document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }, 500);
      }
    </script>
  </body>
</html>
