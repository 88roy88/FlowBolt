<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock SSO Login</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 400px;
        width: 100%;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        color: #1a202c;
        margin-bottom: 8px;
        text-align: center;
      }
      .subtitle {
        color: #718096;
        font-size: 14px;
        text-align: center;
        margin-bottom: 32px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #4a5568;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.2s;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #5568d3;
      }
      button:active {
        background: #4c51bf;
      }
      .info {
        margin-top: 24px;
        padding: 12px;
        background: #edf2f7;
        border-radius: 6px;
        font-size: 12px;
        color: #4a5568;
        line-height: 1.5;
      }
      .info strong {
        color: #2d3748;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Mock SSO Login</h1>
      <p class="subtitle">Development authentication</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="token">Token</label>
          <input
            type="text"
            id="token"
            placeholder="mock-dev-token-123"
            value="mock-dev-token-123"
          />
        </div>

        <div class="form-group">
          <label for="userId">User ID (optional)</label>
          <input type="text" id="userId" placeholder="dev-user" value="dev-user" />
        </div>

        <div class="form-group">
          <label for="userName">User Name (optional)</label>
          <input type="text" id="userName" placeholder="Dev User" value="Dev User" />
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div class="info">
        <strong>Dev Mode:</strong> This is a mock authentication page for local development. In
        production, this would be replaced by your actual SSO/SAML provider.
      </div>
    </div>

    <script>
      // Parse URL parameters for pre-filled values
      const params = new URLSearchParams(window.location.search);
      if (params.has('token')) {
        document.getElementById('token').value = params.get('token');
      }
      if (params.has('userId')) {
        document.getElementById('userId').value = params.get('userId');
      }
      if (params.has('userName')) {
        document.getElementById('userName').value = params.get('userName');
      }

      // Listen for credential requests from parent
      let pendingRequest = null;
      window.addEventListener('message', (event) => {
        const msg = event.data;
        if (
          msg &&
          typeof msg === 'object' &&
          (msg.type === 'requestCredentials' || msg.Type === 'RequestCredentials')
        ) {
          pendingRequest = { source: event.source, origin: event.origin };
        }
      });

      function base64url(str) {
        return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      }

      function buildMockJwt(payload) {
        const header = base64url(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
        const body = base64url(JSON.stringify(payload));
        return `${header}.${body}.mock`;
      }

      // Handle form submission
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const token = document.getElementById('token').value.trim();
        const userId = document.getElementById('userId').value.trim();
        const userName = document.getElementById('userName').value.trim();

        if (!token) {
          alert('Token is required');
          return;
        }

        const now = Math.floor(Date.now() / 1000);
        const exp = now + 60 * 60;

        const jwtPayload = { sub: userId || 'dev-user', name: userName || 'Dev User', iat: now, exp };
        const jwt = buildMockJwt(jwtPayload);

        const expiresAt = new Date(exp * 1000).toISOString();

        // Build credentials payload
        const credentials = {
          type: 'deliverCredentials',
          auth_token: jwt,
        };

        if (userId) credentials.userId = userId;
        if (userName) credentials.userName = userName;
        credentials.expiresAt = expiresAt;

        const target = window.opener || (window.parent !== window ? window.parent : null);
        if (target) {
          const targetOrigin = pendingRequest?.origin || '*';
          target.postMessage(credentials, targetOrigin);
          setTimeout(() => window.close(), 100);
        } else {
          alert('No parent window found.');
        }
      });

      // Auto-submit if ?autoLogin=true
      if (params.has('autoLogin') && params.get('autoLogin') === 'true') {
        setTimeout(() => {
          document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }, 500);
      }
    </script>
  </body>
</html>
