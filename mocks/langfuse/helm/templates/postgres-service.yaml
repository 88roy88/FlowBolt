apiVersion: v1
kind: Service
metadata:
  name: {{ include "langfuse.fullname" . }}-postgres
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    {{- include "langfuse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
