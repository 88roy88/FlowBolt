apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langfuse.fullname" . }}-worker
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "langfuse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "langfuse.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        {{- include "langfuse.podSecurityContextWithUser" . | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "langfuse.image" .Values.images.langfuseWorker }}
          imagePullPolicy: {{ .Values.images.langfuseWorker.pullPolicy }}
          securityContext:
            {{- include "langfuse.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.langfuseWorker | nindent 12 }}
          env:
            {{- include "langfuse.commonEnv" . | nindent 12 }}
          # Depending on worker image readiness probe mechanism, if available.
          # We might safely omit if worker handles disconnects gracefully.
