apiVersion: v1
kind: Service
metadata:
  name: {{ include "langfuse.fullname" . }}-redis
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "langfuse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
