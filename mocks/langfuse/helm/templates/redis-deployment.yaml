apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langfuse.fullname" . }}-redis
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "langfuse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "langfuse.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      # redis:7 runs as the redis user (uid 999) by default; we do not force
      # runAsUser so the image's own USER directive is respected.
      # fsGroup ensures the PVC at /data is group-writable.
      securityContext:
        {{- include "langfuse.podSecurityContext" . | nindent 8 }}
      containers:
        - name: redis
          image: {{ include "langfuse.image" .Values.images.redis }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          securityContext:
            {{- include "langfuse.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources.redis | nindent 12 }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "langfuse.secretName" . }}
                  key: redis-password
          # Enable AOF persistence so data survives pod restarts.
          # --dir /data points Redis at the PVC mount.
          command:
            - redis-server
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--appendonly"
            - "yes"
            - "--dir"
            - "/data"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "langfuse.fullname" . }}-redis
