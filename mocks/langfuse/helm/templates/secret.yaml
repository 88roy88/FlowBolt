# Single Secret holding every credential used by the stack.
# URLs that embed credentials (DATABASE_URL) are also stored here so that
# all sensitive values live in exactly one Kubernetes object.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langfuse.secretName" . }}
  labels:
    {{- include "langfuse.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres-user: {{ .Values.postgres.user | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  postgres-db: {{ .Values.postgres.db | quote }}
  # Full DSN consumed by langfuse-web and langfuse-worker
  database-url: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s"
      .Values.postgres.user
      .Values.postgres.password
      (include "langfuse.fullname" .)
      .Values.postgres.db | quote }}

  # ── ClickHouse ────────────────────────────────────────────────────────────
  clickhouse-user: {{ .Values.clickhouse.user | quote }}
  clickhouse-password: {{ .Values.clickhouse.password | quote }}

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis-password: {{ .Values.redis.password | quote }}

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio-root-user: {{ .Values.minio.rootUser | quote }}
  minio-root-password: {{ .Values.minio.rootPassword | quote }}

  # ── Langfuse app secrets ───────────────────────────────────────────────────
  salt: {{ .Values.langfuse.salt | quote }}
  encryption-key: {{ .Values.langfuse.encryptionKey | quote }}
  nextauth-secret: {{ .Values.langfuse.nextauthSecret | quote }}
