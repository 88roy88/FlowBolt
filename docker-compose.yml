services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mocks:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mocks:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    environment:
      MOCK_PORT: "4000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - workspaces:/var/lib/ai-builder/workspaces
      - db-data:/app/data
    environment:
      - AIB_WORKSPACE_BASE_DIR=/var/lib/ai-builder/workspaces
      - AIB_DATABASE_URL=sqlite:///app/data/ai_builder.db
      - AIB_AI_MODEL=bedrock/anthropic.claude-sonnet-4-20250514
      - AWS_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  workspaces:
  db-data:
