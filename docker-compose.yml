x-db-shared: &db-shared
  POSTGRES_USER: &db-user postgres
  POSTGRES_PASSWORD: &db-pass postgres
  POSTGRES_DB: &db-name flow44
  DB_HOST: &db-host postgres
  DB_PORT: &db-port 5432
  DB_SCHEME: &db-scheme postgresql

x-minio-shared: &minio-shared
  MINIO_ROOT_USER: &s3-user minioadmin
  MINIO_ROOT_PASSWORD: &s3-pass minioadminpassword
  S3_ACCESS_KEY: *s3-user
  S3_SECRET_KEY: *s3-pass
  S3_ENDPOINT_URL: &s3-url http://minio:9000
  S3_BUCKET_NAME: &s3-bucket flow44

services:
  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    cgroup: host
    volumes:
      - workspaces:/var/lib/ai-builder/workspaces
      - db-data:/app/data
    env_file:
      - ./backend/.env
    environment:
      <<: [*db-shared, *minio-shared]
      AIB_DB_USER: *db-user
      AIB_DB_PASSWORD: *db-pass
      AIB_DB_NAME: *db-name
      AIB_DB_HOST: *db-host
      AIB_DB_PORT: *db-port
      AIB_DB_SCHEME: *db-scheme
      AIB_WORKSPACE_BASE_DIR: /var/lib/ai-builder/workspaces
      AIB_FLAPI_BASE_URL: http://flapi-mock:6001
      S3_ENDPOINT_URL: *s3-url
      S3_BUCKET_NAME: *s3-bucket
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - internal
    depends_on:
      - postgres
      - minio
    restart: unless-stopped

  flapi-mock:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mocks/flapi-mock:/app
    command: sh -c "npm install && node server.js"
    expose:
      - "6001"
    environment:
      MOCK_PORT: "6001"
    ports:
      - "6001:6001"
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: flow44-postgres
    environment: *db-shared
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment: *minio-shared
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  workspaces:
  db-data:
  postgres_data:
  minio-data:
