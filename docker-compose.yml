services:
  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    cgroup: host
    volumes:
      - workspaces:/var/lib/ai-builder/workspaces
      - db-data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - AIB_WORKSPACE_BASE_DIR=/var/lib/ai-builder/workspaces
      - AIB_DATABASE_URL=sqlite:////app/data/ai_builder.db
      - AIB_FLAPI_BASE_URL=http://cases-mock:4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - internal
    depends_on:
      - postgres
    restart: unless-stopped

  cases-mock:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mocks/cases-mock:/app
    command: sh -c "npm install && node server.js"
    expose:
      - "4000"
    environment:
      MOCK_PORT: "4000"
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: flowbolt-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowbolt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  internal:

volumes:
  workspaces:
  db-data:
  postgres_data: