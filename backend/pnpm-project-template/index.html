<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App</title>
  <script id="__ERROR_REPORTER__">
(function(){
  function report(err){
    if(!window.parent||window.parent===window)return;
    window.parent.postMessage({
      type:'runtime-error',
      message:String(err.message||err),
      file:err.filename||err.fileName||'',
      line:err.lineno||err.lineNumber||0,
      column:err.colno||err.columnNumber||0,
      stack:err.error?err.error.stack||'':''
    },'*');
  }
  window.addEventListener('error',function(e){report(e)});
  window.addEventListener('unhandledrejection',function(e){
    var r=e.reason||{};
    report({message:r.message||String(r),stack:r.stack||''});
  });
  // a script to capture console.logs
  function parseCaller(){
    try{
      var s=(new Error()).stack||'';
      var lines=s.split('\n');
      for(var i=0;i<lines.length;i++){
        var l=lines[i];
        if(l.indexOf('__ERROR_REPORTER__')!==-1)continue;
        if(l.indexOf('node_modules')!==-1)continue;
        var m=l.match(/\/src\/(.+?)(?:\?[^:]*)?:(\d+):(\d+)/);
        if(m)return{file:'src/'+m[1],line:parseInt(m[2],10),column:parseInt(m[3],10)};
      }
    }catch(e){}
    return null;
  }
  ['log','warn','error','info'].forEach(function(level){
    var orig=console[level];
    console[level]=function(){
      orig.apply(console,arguments);
      if(!window.parent||window.parent===window)return;
      var args=[];
      for(var i=0;i<arguments.length;i++){
        try{args.push(typeof arguments[i]==='object'?JSON.stringify(arguments[i]):String(arguments[i]))}
        catch(e){args.push('[unserializable]')}
      }
      var caller=parseCaller();
      var msg={type:'console',level:level,args:args};
      if(caller){msg.file=caller.file;msg.line=caller.line;msg.column=caller.column;}
      window.parent.postMessage(msg,'*');
    };
  });
})()
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
