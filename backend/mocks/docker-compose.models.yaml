# Local dev model stack: CPU-only vLLM code models.
# Combine with docker-compose.yaml for full stack:
# docker compose -f docker-compose.yaml -f docker-compose.models.yaml up -d

services:
  # Legacy service name kept for compatibility; runs Qwen 2.5 Coder 1.5B (CPU-friendly).
  # Host port 8010 -> MODEL_URL=http://localhost:8010/v1, MODEL_NAME=Qwen/Qwen2.5-Coder-1.5B-Instruct
  vllm-gemma:
    image: vllm/vllm-openai-cpu:latest
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      # Avoid "Not enough allowed NUMA nodes" in Docker (no NUMA visible): bind to one CPU range.
      - VLLM_CPU_OMP_THREADS_BIND=0-7
      # Limit KV cache to avoid OOM (default 5.83 GiB can trigger SIGKILL -9). If inference still kills the engine, try 1 and max-model-len 1024.
      - VLLM_CPU_KVCACHE_SPACE=${VLLM_CPU_KVCACHE_SPACE:-2}
    ports:
      - "8010:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    ipc: host
    command: --model Qwen/Qwen2.5-Coder-1.5B-Instruct --download-dir /root/.cache/huggingface/hub --max-model-len 2048

  # Legacy service name kept for compatibility; runs DeepSeek Coder 1.3B (CPU-friendly).
  # Host port 8011 -> MODEL_URL=http://localhost:8011/v1, MODEL_NAME=deepseek-ai/deepseek-coder-1.3b-instruct
  vllm-qwen:
    image: vllm/vllm-openai-cpu:latest
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      - VLLM_CPU_OMP_THREADS_BIND=0-7
    ports:
      - "8011:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    ipc: host
    command: --model deepseek-ai/deepseek-coder-1.3b-instruct --download-dir /root/.cache/huggingface/hub --max-model-len 4096

  # One-shot model prefetch for offline development.
  # Run with:
  # docker compose -f docker-compose.yaml -f docker-compose.models.yaml --profile warmup up model-cache-warmup
  model-cache-warmup:
    image: vllm/vllm-openai-cpu:latest
    profiles: ["warmup"]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_OFFLINE=0
      - TRANSFORMERS_OFFLINE=0
    volumes:
      - hf_cache:/root/.cache/huggingface
    command: >-
      python -c "from huggingface_hub import snapshot_download; snapshot_download('Qwen/Qwen2.5-Coder-1.5B-Instruct'); snapshot_download('deepseek-ai/deepseek-coder-1.3b-instruct'); print('Model warmup complete')"

volumes:
  hf_cache:
    # Persists downloaded models so vLLM works offline after first pull.
