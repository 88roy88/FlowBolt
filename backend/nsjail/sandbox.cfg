# nsjail configuration template (reference).
# The actual nsjail command is built programmatically in app/sandbox/nsjail.py.
# This file serves as documentation of the sandbox policy.

name: "ai-builder-sandbox"

mode: ONCE

# Hostname visible inside the jail
hostname: "sandbox"

# Working directory inside the jail
cwd: "/home/project"

# Time limit per command (seconds)
time_limit: 60

# Resource limits
rlimit_as_type: HARD
rlimit_cpu_type: HARD
rlimit_fsize_type: HARD
rlimit_nofile_type: HARD

# Cgroup limits (cgroup v2)
use_cgroupv2: true
cgroup_mem_max: 536870912    # 512 MB
cgroup_pids_max: 256

# Mount points
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
    mandatory: false
}

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
}

mount {
    src: "/sbin"
    dst: "/sbin"
    is_bind: true
    rw: false
}

# Workspace — read-write, path substituted at runtime
mount {
    src: "{WORKSPACE_DIR}"
    dst: "/home/project"
    is_bind: true
    rw: true
}

# /tmp inside the jail
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
}

# /dev/null, /dev/urandom
mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: false
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}
